name: Deploy to Vercel

on:
  push:
    branches:
      - claude/build-app-from-image-maTRF
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI and jq
        run: |
          npm install -g vercel@latest
          sudo apt-get install -y jq

      # ── Create/get Vercel project via API ─────────────────────────────────────
      - name: Create Vercel project
        run: |
          # Get account ID
          ORG_ID=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user" | jq -r '.user.id')
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV
          echo "Account ID: $ORG_ID"

          # Try to create project (will return existing project if name taken)
          CREATE_RESP=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ad-lottery","framework":"nextjs"}' \
            "https://api.vercel.com/v1/projects")

          PROJECT_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')

          # If creation returned no ID, project might already exist — fetch it
          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v1/projects/ad-lottery" | jq -r '.id')
          fi

          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "Project ID: $PROJECT_ID"

          # Write .vercel/project.json so CLI needs no prompts
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$ORG_ID" "$PROJECT_ID" > .vercel/project.json
          echo "Linked project.json written"

      # ── Generate Prisma client ────────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate

      # ── First deployment ──────────────────────────────────────────────────────
      - name: Deploy to Vercel
        run: |
          DEPLOY_OUTPUT=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod \
            --yes \
            --no-wait 2>&1 || true)
          echo "$DEPLOY_OUTPUT"

          # Also do a confirmed deploy
          DEPLOY_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod \
            --yes 2>&1 | grep -E "https://" | tail -1)

          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed: $DEPLOY_URL"

      # ── Set NEXTAUTH env vars via API ─────────────────────────────────────────
      - name: Set NEXTAUTH_SECRET
        run: |
          SECRET=$(openssl rand -base64 32)
          curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXTAUTH_SECRET\",\"value\":\"$SECRET\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            "https://api.vercel.com/v1/projects/$PROJECT_ID/env" | jq '.key // .error'

      - name: Set NEXTAUTH_URL
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXTAUTH_URL\",\"value\":\"$DEPLOY_URL\",\"type\":\"plain\",\"target\":[\"production\"]}" \
            "https://api.vercel.com/v1/projects/$PROJECT_ID/env" | jq '.key // .error'

      # ── Create Vercel Postgres database ───────────────────────────────────────
      - name: Create Postgres database
        id: create_db
        run: |
          echo "Attempting to create Vercel Postgres store..."

          # Try the storage API
          STORE_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ad-lottery-db\",\"type\":\"postgres\",\"projectIds\":[\"$PROJECT_ID\"]}" \
            "https://api.vercel.com/v1/storage/stores")

          echo "Store response: $STORE_RESP" | head -c 300

          STORE_ID=$(echo "$STORE_RESP" | jq -r '.store.id // empty')
          if [ -n "$STORE_ID" ]; then
            echo "STORE_ID=$STORE_ID" >> $GITHUB_ENV
            echo "Created Postgres store: $STORE_ID"
          else
            echo "DB_MANUAL=true" >> $GITHUB_ENV
            echo "Auto-create not available — will output manual instructions"
          fi

      # ── Pull env (includes DATABASE_URL if store was linked) ──────────────────
      - name: Pull environment variables
        run: |
          vercel env pull .env.production \
            --token "$VERCEL_TOKEN" \
            --yes 2>&1 || true

      # ── Run migrations if DATABASE_URL exists ─────────────────────────────────
      - name: Run migrations and seed
        run: |
          if [ -f .env.production ] && grep -q "DATABASE_URL" .env.production; then
            set -a && source .env.production && set +a
            npx prisma db push --skip-generate
            npx tsx prisma/seed.ts
            echo "DB_READY=true" >> $GITHUB_ENV
            echo "✅ Database ready"
          else
            echo "⚠️  No DATABASE_URL — skipping migrations"
          fi

      # ── Final redeploy to pick up all env vars ────────────────────────────────
      - name: Final production deployment
        run: |
          FINAL_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod \
            --yes 2>&1 | grep -E "https://" | tail -1)
          echo "FINAL_URL=${FINAL_URL:-$DEPLOY_URL}" >> $GITHUB_ENV

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo ""
          echo "================================================"
          echo "  App deployed: ${FINAL_URL:-$DEPLOY_URL}"
          echo "================================================"
          if [ "$DB_MANUAL" = "true" ]; then
            echo ""
            echo "  ⚠️  DATABASE: One manual step needed!"
            echo "  Go to: https://vercel.com/dashboard"
            echo "  → Your project → Storage tab → Create Database"
            echo "  → Choose Postgres → Connect to this project"
            echo "  Then re-run this workflow."
          else
            echo ""
            echo "  ✅ Database configured"
            echo "  Admin:  admin@adlottery.com / admin123"
            echo "  User:   user@adlottery.com  / user123"
          fi
          echo "================================================"

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${FINAL_URL:-$DEPLOY_URL}" >> $GITHUB_STEP_SUMMARY
          if [ "$DB_MANUAL" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Add Postgres:** Vercel Dashboard → Storage → Create Database → Postgres → Connect" >> $GITHUB_STEP_SUMMARY
            echo "Then re-run this workflow to run migrations." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Account | Email | Password |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Admin | admin@adlottery.com | admin123 |" >> $GITHUB_STEP_SUMMARY
            echo "| User | user@adlottery.com | user123 |" >> $GITHUB_STEP_SUMMARY
          fi
