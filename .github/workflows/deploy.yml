name: Deploy to Vercel

on:
  push:
    branches:
      - claude/build-app-from-image-maTRF
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI and jq
        run: |
          npm install -g vercel@latest
          sudo apt-get install -y jq

      # ── Create/get Vercel project via API ─────────────────────────────────────
      - name: Create Vercel project
        run: |
          ORG_ID=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user" | jq -r '.user.id')
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV

          CREATE_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"ad-lottery","framework":"nextjs"}' \
            "https://api.vercel.com/v1/projects")

          PROJECT_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')

          if [ -z "$PROJECT_ID" ]; then
            PROJECT_ID=$(curl -sf \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v1/projects/ad-lottery" | jq -r '.id')
          fi

          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          echo "Project: $PROJECT_ID"

          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$ORG_ID" "$PROJECT_ID" > .vercel/project.json

      # ── Generate Prisma client ────────────────────────────────────────────────
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@localhost/dummy"

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Deploy to Vercel
        run: |
          DEPLOY_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod \
            --yes 2>&1 | grep -E "https://[^ ]+" | tail -1)
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed: $DEPLOY_URL"

      # ── Set env vars via Vercel API (no jq on response — avoids array parsing) -
      - name: Set environment variables
        run: |
          SECRET=$(openssl rand -base64 32)

          set_env() {
            local KEY="$1"
            local VALUE="$2"
            local TYPE="$3"
            # Delete existing first (ignore errors)
            curl -s -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env/$KEY" > /dev/null 2>&1 || true

            # Add new value
            HTTP=$(curl -s -o /tmp/env_resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"$TYPE\",\"target\":[\"production\",\"preview\"]}" \
              "https://api.vercel.com/v10/projects/$PROJECT_ID/env")

            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "  ✅ $KEY set"
            else
              echo "  ⚠️  $KEY — HTTP $HTTP"
              cat /tmp/env_resp.json | jq -r '.error.message // .' 2>/dev/null || true
            fi
          }

          set_env "NEXTAUTH_SECRET" "$SECRET" "encrypted"
          set_env "NEXTAUTH_URL"    "$DEPLOY_URL" "plain"

      # ── Create Postgres database ──────────────────────────────────────────────
      - name: Create Postgres database
        continue-on-error: true
        run: |
          echo "Attempting to create Vercel Postgres store..."
          STORE_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"ad-lottery-db\",\"type\":\"postgres\",\"projectIds\":[\"$PROJECT_ID\"]}" \
            "https://api.vercel.com/v1/storage/stores")

          STORE_ID=$(echo "$STORE_RESP" | jq -r '.store.id // empty' 2>/dev/null)
          if [ -n "$STORE_ID" ]; then
            echo "DB_CREATED=true" >> $GITHUB_ENV
            echo "  ✅ Postgres store created: $STORE_ID"
          else
            echo "DB_CREATED=false" >> $GITHUB_ENV
            echo "  ℹ️  Auto-create skipped (will output manual instructions)"
          fi

      # ── Pull env + run migrations ─────────────────────────────────────────────
      - name: Pull env and run migrations
        continue-on-error: true
        run: |
          vercel env pull .env.production --token "$VERCEL_TOKEN" --yes 2>&1 || true

          if [ -f .env.production ] && grep -q "DATABASE_URL" .env.production; then
            set -a && source .env.production && set +a
            echo "Running prisma db push..."
            npx prisma db push --skip-generate
            echo "Seeding..."
            npx tsx prisma/seed.ts
            echo "DB_READY=true" >> $GITHUB_ENV
          else
            echo "DB_READY=false" >> $GITHUB_ENV
            echo "No DATABASE_URL yet — migrations skipped"
          fi

      # ── Final redeploy with all env vars ──────────────────────────────────────
      - name: Final production deployment
        run: |
          FINAL_URL=$(vercel deploy \
            --token "$VERCEL_TOKEN" \
            --prod \
            --yes 2>&1 | grep -E "https://[^ ]+" | tail -1)
          echo "FINAL_URL=${FINAL_URL:-$DEPLOY_URL}" >> $GITHUB_ENV

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          URL="${FINAL_URL:-$DEPLOY_URL}"
          echo ""
          echo "=============================================="
          echo "  🚀  LIVE: $URL"
          echo "=============================================="

          if [ "$DB_READY" != "true" ]; then
            echo ""
            echo "  ⚠️  DATABASE: one step needed in browser:"
            echo ""
            echo "  1. Go to https://vercel.com/dashboard"
            echo "  2. Open project 'ad-lottery'"
            echo "  3. Storage tab → Create Database → Postgres"
            echo "  4. Click 'Connect to project'"
            echo "  5. Re-run this workflow"
            echo ""
          else
            echo ""
            echo "  Admin:  admin@adlottery.com / admin123"
            echo "  User:   user@adlottery.com  / user123"
          fi
          echo "=============================================="

          echo "## 🚀 Live: $URL" >> $GITHUB_STEP_SUMMARY
          if [ "$DB_READY" != "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Add database:** Vercel dashboard → project → Storage → Create Database → Postgres → Connect → re-run workflow" >> $GITHUB_STEP_SUMMARY
          else
            echo "| | Email | Password |" >> $GITHUB_STEP_SUMMARY
            echo "|--|-------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Admin | admin@adlottery.com | admin123 |" >> $GITHUB_STEP_SUMMARY
            echo "| User | user@adlottery.com | user123 |" >> $GITHUB_STEP_SUMMARY
          fi
